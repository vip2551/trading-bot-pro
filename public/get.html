<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل Trading Bot Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #10b981; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn {
            display: block;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px auto;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }
        .links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .links a {
            color: #38bdf8;
            text-decoration: none;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        .links a:hover {

        }

    <div class="box">

            1. فك ضغط الملف<br>
            2. bun install<br>
            3. bun run db:push<br>

        <div class="links">
