<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            background: #0f172a !important; 
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Simple app without dependencies
        const t = {
            title: "بوت التداول برو",
            demo: "تجريبي",
            start: "تشغيل",
            stop: "إيقاف",
            dashboard: "لوحة التحكم",
            trades: "الصفقات",
            manual: "يدوي",
            strike: "الاسترايك",
            ai: "الذكاء",
            analytics: "التحليلات",
            charts: "الرسوم",
            whales: "الحيتان",
            connection: "الاتصال",
            webhook: "ويب هوك",
            notifications: "الإشعارات",
            risk: "المخاطر",
            journal: "اليومية",
            calendar: "التقويم",
            security: "الأمان",
            backup: "النسخ",
            help: "المساعدة"
        };
        
        const tabs = [
            { id: 'dashboard', icon: '📊', color: '#3b82f6' },
            { id: 'trades', icon: '📜', color: '#a855f7' },
            { id: 'manual', icon: '➡️', color: '#22c55e' },
            { id: 'strike', icon: '🎯', color: '#f97316' },
            { id: 'ai', icon: '🧠', color: '#ec4899' },
            { id: 'analytics', icon: '📈', color: '#06b6d4' },
            { id: 'charts', icon: '📉', color: '#6366f1' },
            { id: 'whales', icon: '🐋', color: '#14b8a6' },
            { id: 'connection', icon: '🔌', color: '#22c55e' },
            { id: 'webhook', icon: '🧪', color: '#f59e0b' },
            { id: 'notifications', icon: '🔔', color: '#f43f5e' },
            { id: 'risk', icon: '🧮', color: '#eab308' },
            { id: 'journal', icon: '📝', color: '#94a3b8' },
            { id: 'calendar', icon: '📅', color: '#60a5fa' },
            { id: 'security', icon: '🔒', color: '#6b7280' },
            { id: 'backup', icon: '💾', color: '#10b981' },
            { id: 'help', icon: '❓', color: '#0ea5e9' }
        ];
        
        let activeTab = 'dashboard';
        let botRunning = false;
        
        function render() {
            document.getElementById('root').innerHTML = `
                <div style="min-height:100vh;background:#0f172a;color:#fff;font-family:system-ui">
                    <header style="position:sticky;top:0;background:#0f172a;border-bottom:1px solid #334155;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
                        <div style="display:flex;align-items:center;gap:12px">
                            <span style="font-size:28px">🤖</span>
                            <div>
                                <h1 style="font-size:18px;font-weight:bold">${t.title}</h1>
                                <span style="font-size:12px;color:#94a3b8">${t.demo}</span>
                            </div>
                        </div>
                        <button onclick="toggleBot()" style="background:${botRunning ? '#ef4444' : '#10b981'};color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px">
                            ${botRunning ? '⏹️ ' + t.stop : '▶️ ' + t.start}
                        </button>
                    </header>
                    
                    <nav style="padding:12px;overflow-x:auto;background:#1e293b">
                        <div style="display:flex;gap:4px;flex-wrap:wrap">
                            ${tabs.map(tab => `
                                <button onclick="setTab('${tab.id}')" style="
                                    background:${activeTab === tab.id ? tab.color : 'transparent'};
                                    border:1px solid #334155;
                                    color:#fff;
                                    padding:8px 12px;
                                    border-radius:8px;
                                    cursor:pointer;
                                    font-size:12px;
                                    white-space:nowrap
                                ">${tab.icon} ${t[tab.id]}</button>
                            `).join('')}
                        </div>
                    </nav>
                    
                    <main style="padding:20px;max-width:1200px;margin:0 auto">
                        ${renderContent()}
                    </main>
                </div>
            `;
        }
        
        function renderContent() {
            if (activeTab === 'dashboard') {
                return `
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px">
                        <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155">
                            <div style="color:#94a3b8;font-size:14px">إجمالي الصفقات</div>
                            <div style="font-size:28px;font-weight:bold">0</div>
                        </div>
                        <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155">
                            <div style="color:#94a3b8;font-size:14px">الصفقات المفتوحة</div>
                            <div style="font-size:28px;font-weight:bold;color:#3b82f6">0</div>
                        </div>
                        <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155">
                            <div style="color:#94a3b8;font-size:14px">نسبة الفوز</div>
                            <div style="font-size:28px;font-weight:bold">0%</div>
                        </div>
                        <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155">
                            <div style="color:#94a3b8;font-size:14px">إجمالي P&L</div>
                            <div style="font-size:28px;font-weight:bold;color:#10b981">$0.00</div>
                        </div>
                    </div>
                    <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155">
                        <h2 style="font-size:16px;margin-bottom:12px">📜 الصفقات الأخيرة</h2>
                        <p style="color:#94a3b8;text-align:center;padding:40px">لا توجد صفقات بعد</p>
                    </div>
                `;
            }
            
            if (activeTab === 'manual') {
                return `
                    <div style="background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155;max-width:500px">
                        <h2 style="font-size:16px;margin-bottom:16px">➡️ صفقة يدوية</h2>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                            <div>
                                <label style="display:block;margin-bottom:4px;color:#94a3b8;font-size:14px">الرمز</label>
                                <select style="width:100%;padding:10px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px">
                                    <option>SPX</option>
                                    <option>SPY</option>
                                    <option>QQQ</option>
                                </select>
                            </div>
                            <div>
                                <label style="display:block;margin-bottom:4px;color:#94a3b8;font-size:14px">الاتجاه</label>
                                <select style="width:100%;padding:10px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px">
                                    <option>CALL</option>
                                    <option>PUT</option>
                                </select>
                            </div>
                            <div>
                                <label style="display:block;margin-bottom:4px;color:#94a3b8;font-size:14px">الكمية</label>
                                <input type="number" value="1" style="width:100%;padding:10px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px">
                            </div>
                            <div>
                                <label style="display:block;margin-bottom:4px;color:#94a3b8;font-size:14px">الاسترايك</label>
                                <input type="number" placeholder="اختياري" style="width:100%;padding:10px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px">
                            </div>
                        </div>
                        <button style="width:100%;margin-top:16px;padding:12px;background:#10b981;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">تنفيذ الصفقة</button>
                    </div>
                `;
            }
            
            return `
                <div style="background:#1e293b;padding:40px;border-radius:12px;border:1px solid #334155;text-align:center">
                    <span style="font-size:48px">${tabs.find(t => t.id === activeTab)?.icon || '📋'}</span>
                    <h2 style="font-size:18px;margin-top:12px">${t[activeTab]}</h2>
                    <p style="color:#94a3b8;margin-top:8px">هذه الميزة قيد التطوير</p>
                </div>
            `;
        }
        
        function setTab(id) {
            activeTab = id;
            render();
        }
        
        function toggleBot() {
            botRunning = !botRunning;
            render();
        }
        
        render();
    </script>
</body>
</html>
